{{ define "main" }}
{{ $projects := hugo.Data.projects }}
<div class="wrapper post">
  <main class="page-content" aria-label="Content">
    <header class="header">
      <h1 class="header-title">{{ .Title }}</h1>
    </header>

    <div class="page-content">
      {{ range $projects.project }}
      <div style="margin-bottom:1.5rem;padding:1rem 1.25rem;border:1px solid rgba(128,128,128,.15);border-radius:8px;">
        <h3 style="margin:0 0 .4rem;">{{ .name }}</h3>
        <p style="margin:0 0 .75rem;opacity:.85;">{{ .desc }}</p>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem;">
          {{ range .tags }}
          <span style="font-size:.75rem;padding:2px 8px;border-radius:4px;border:1px solid rgba(128,128,128,.2);background:rgba(128,128,128,.08);">{{ . }}</span>
          {{ end }}
        </div>
        <div style="display:flex;gap:1rem;">
          {{ range .links }}
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer"
            style="font-size:.875rem;text-transform:capitalize;">{{ .name }}</a>
          {{ end }}
        </div>
      </div>
      {{ end }}
    </div>
  </main>
</div>
{{ end }}
